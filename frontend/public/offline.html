<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — HustleScale</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #FFF8E7;
      color: #1A1A2E;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 1.5rem;
    }
    .card { text-align: center; max-width: 380px; }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; color: #1B4332; }
    p { font-size: 0.9rem; color: #6B7280; line-height: 1.5; margin-bottom: 1.5rem; }
    button {
      background: linear-gradient(135deg, #2D6A4F, #1B4332);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0.75rem 1.5rem;
      font-size: 0.9rem;
      cursor: pointer;
      min-height: 44px;
      touch-action: manipulation;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true">&#x1F4BC;</div>
    <h1>You're offline</h1>
    <p>HustleScale needs an internet connection to help you build your business. Please check your connection and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
